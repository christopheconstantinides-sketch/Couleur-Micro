<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activité orale</title>

  <style>
    :root {
      --fond: #f3f4f6;
      --carte: #ffffff;
      --texte: #111827;
      --gris: #6b7280;
      --bordure: #e5e7eb;
      --bleu: #2563eb;
      --vert: #16a34a;
      --rouge: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      color: var(--texte);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 950px;
      background: var(--carte);
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.15);
      padding: 28px;
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    .intro {
      text-align: center;
      color: var(--gris);
      line-height: 1.5;
      margin-bottom: 22px;
    }

    .badges {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .badge {
      background: #f9fafb;
      border: 1px solid var(--bordure);
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: bold;
    }

    .zone {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 24px;
      align-items: stretch;
    }

    .image-zone {
      min-height: 340px;
      background: #f9fafb;
      border: 1px solid var(--bordure);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      overflow: hidden;
    }

    .image-zone img {
      max-width: 100%;
      max-height: 310px;
      object-fit: contain;
      border-radius: 18px;
    }

    .placeholder {
      font-size: 5rem;
      color: #cbd5e1;
      font-weight: bold;
    }

    .panel {
      min-height: 340px;
      background: #f9fafb;
      border: 1px solid var(--bordure);
      border-radius: 24px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      justify-content: space-between;
    }

    .bulle {
      background: white;
      border: 2px solid var(--bordure);
      border-radius: 20px;
      padding: 15px;
      min-height: 70px;
      line-height: 1.45;
    }

    .bulle strong {
      display: block;
      margin-bottom: 5px;
      color: #1d4ed8;
    }

    .bon {
      background: #f0fdf4;
      border-color: #86efac;
    }

    .mauvais {
      background: #fef2f2;
      border-color: #fecaca;
    }

    .boutons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-vert {
      background: var(--vert);
      color: white;
    }

    .btn-bleu {
      background: var(--bleu);
      color: white;
    }

    .btn-rouge {
      background: var(--rouge);
      color: white;
    }

    .btn-gris {
      background: #e5e7eb;
      color: #111827;
    }

    .message {
      margin-top: 18px;
      padding: 14px;
      border-radius: 16px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e3a8a;
      line-height: 1.45;
      display: none;
    }

    .erreur {
      background: #fef2f2;
      border-color: #fecaca;
      color: #991b1b;
    }

    .final {
      display: none;
      margin-top: 18px;
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #14532d;
      padding: 18px;
      border-radius: 20px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .student-code {
      display: none;
      max-width: 360px;
      margin: 0 auto 18px;
    }

    .student-code label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .student-code input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 12px;
      font-size: 1rem;
      text-align: center;
    }

    @media (max-width: 780px) {
      body {
        padding: 12px;
      }

      .app {
        padding: 18px;
      }

      .zone {
        grid-template-columns: 1fr;
      }

      .image-zone,
      .panel {
        min-height: auto;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <h1 id="title">Activité orale</h1>

    <p id="intro" class="intro">
      Chargement de l’activité...
    </p>

    <div id="studentCodeBox" class="student-code">
      <label for="studentCode">Code élève</label>
      <input id="studentCode" type="text" placeholder="Exemple : A7K4" maxlength="12">
    </div>

    <div class="badges">
      <div id="progressBadge" class="badge">Carte : 0 / 0</div>
      <div id="scoreBadge" class="badge">Score : 0</div>
      <div id="microBadge" class="badge">Micro : arrêté</div>
    </div>

    <section class="zone">
      <div id="imageZone" class="image-zone">
        <div class="placeholder">?</div>
      </div>

      <div class="panel">
        <div id="appBubble" class="bulle">
          <strong>Voix de la Web App</strong>
          En attente.
        </div>

        <div id="studentBubble" class="bulle">
          <strong>Voix de l’élève</strong>
          La reconnaissance vocale apparaîtra ici.
        </div>

        <div id="resultBubble" class="bulle">
          <strong>Résultat</strong>
          En attente.
        </div>

        <div class="boutons">
          <button id="startBtn" class="btn-vert" onclick="startActivity()" disabled>Démarrer</button>
          <button id="speakBtn" class="btn-bleu" onclick="startListening()" disabled>🎙️ Parler</button>
          <button id="stopBtn" class="btn-rouge" onclick="stopListening()" disabled>Stop</button>
          <button class="btn-gris" onclick="resetActivity()">Reset</button>
        </div>
      </div>
    </section>

    <div id="finalBox" class="final"></div>
    <div id="message" class="message"></div>
  </main>

  <script>
    const API_URL = "https://script.google.com/a/macros/clgstgab.fr/s/AKfycbyXe9CNrQrnzN2zo-_JRI2ctl1tmRdlwHz8AMb7LLvq9zZNTUEnRSoHfX_p-Sxe_DgB/exec";

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    let activity = null;
    let cards = [];
    let recognition = null;

    let index = -1;
    let score = 0;
    let listening = false;
    let alreadyChecked = false;
    let transcripts = [];
    let timerStop = null;
    let timerDisplay = null;
    let remainingSeconds = 10;
    let details = [];

    const titleEl = document.getElementById("title");
    const introEl = document.getElementById("intro");
    const studentCodeBox = document.getElementById("studentCodeBox");
    const studentCodeInput = document.getElementById("studentCode");

    const progressBadge = document.getElementById("progressBadge");
    const scoreBadge = document.getElementById("scoreBadge");
    const microBadge = document.getElementById("microBadge");

    const imageZone = document.getElementById("imageZone");
    const appBubble = document.getElementById("appBubble");
    const studentBubble = document.getElementById("studentBubble");
    const resultBubble = document.getElementById("resultBubble");

    const startBtn = document.getElementById("startBtn");
    const speakBtn = document.getElementById("speakBtn");
    const stopBtn = document.getElementById("stopBtn");

    const finalBox = document.getElementById("finalBox");
    const messageBox = document.getElementById("message");

    window.addEventListener("load", init);

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const activityId = params.get("activite");

      if (API_URL.includes("COLLE_ICI")) {
        showMessage("Le lecteur GitHub n’est pas encore configuré : il faut coller l’URL Apps Script dans API_URL.", true);
        return;
      }

      if (!activityId) {
        showMessage("Aucune activité indiquée dans le lien. Il manque le paramètre ?activite=CODE.", true);
        return;
      }

      if (!window.isSecureContext) {
        showMessage("La page doit être ouverte en HTTPS pour utiliser le micro.", true);
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showMessage("Ce navigateur ne permet pas l’accès au micro. Essaie avec Chrome ou Edge.", true);
        return;
      }

      if (!SpeechRecognition) {
        showMessage("La reconnaissance vocale n’est pas disponible dans ce navigateur. Essaie avec Chrome ou Edge.", true);
        return;
      }

      try {
        const data = await callApi({
          action: "loadActivity",
          id: activityId
        });

        if (!data.ok) {
          showMessage(data.error || "Impossible de charger l’activité.", true);
          return;
        }

        activity = data.activity;
        cards = data.cards || [];

        if (cards.length === 0) {
          showMessage("Cette activité ne contient aucune carte.", true);
          return;
        }

        setupRecognition();
        renderActivityIntro();

      } catch (err) {
        showMessage("Erreur de chargement : " + (err.message || err), true);
      }
    }

    function renderActivityIntro() {
      titleEl.textContent = activity.title || "Activité orale";

      const modeText = activity.mode === "evaluation" ? "Évaluation" : "Activité";

      introEl.innerHTML =
        "Écoute le mot, clique sur <strong>Parler</strong>, répète, puis clique sur <strong>Stop</strong>. " +
        "Le micro s’arrête automatiquement après " + activity.duration + " secondes.<br>" +
        "Mode : <strong>" + modeText + "</strong>";

      if (activity.mode === "evaluation") {
        studentCodeBox.style.display = "block";
      }

      progressBadge.textContent = "Carte : 0 / " + cards.length;
      scoreBadge.textContent = "Score : 0";
      microBadge.textContent = "Micro : arrêté";

      startBtn.disabled = false;
      showMessage("Activité chargée. Clique sur Démarrer.", false);
    }

    function setupRecognition() {
      recognition = new SpeechRecognition();
      recognition.lang = activity.language || "en-GB";
      recognition.interimResults = true;
      recognition.continuous = false;
      recognition.maxAlternatives = 5;

      recognition.onstart = () => {
        listening = true;
        alreadyChecked = false;
        transcripts = [];
        remainingSeconds = Number(activity.duration || 10);

        speakBtn.disabled = true;
        stopBtn.disabled = false;

        microBadge.textContent = "Micro : " + remainingSeconds + " s";
        studentBubble.className = "bulle";
        studentBubble.innerHTML = "<strong>Voix de l’élève</strong>J’écoute...";

        startCountdown();
      };

      recognition.onresult = event => {
        transcripts = [];

        for (let i = 0; i < event.results.length; i++) {
          const result = event.results[i];

          for (let j = 0; j < result.length; j++) {
            if (result[j].transcript) {
              transcripts.push(result[j].transcript);
            }
          }
        }

        const visible = transcripts[0] || "…";

        studentBubble.innerHTML =
          "<strong>Voix de l’élève</strong>J’ai compris : <strong>" +
          escapeHtml(visible) +
          "</strong>";
      };

      recognition.onerror = event => {
        if (event.error === "not-allowed") {
          showMessage("Le micro est bloqué. Autorise le micro dans le navigateur, puis recharge la page.", true);
          stopTimers();
          microBadge.textContent = "Micro : bloqué";
          listening = false;
          speakBtn.disabled = false;
          stopBtn.disabled = true;
          return;
        }

        if (event.error === "no-speech") {
          transcripts = [];
        }
      };

      recognition.onend = () => {
        stopTimers();

        if (listening && !alreadyChecked) {
          listening = false;
          alreadyChecked = true;
          checkAnswer();
        }

        stopBtn.disabled = true;
      };
    }

    function startActivity() {
      if (activity.mode === "evaluation") {
        const code = studentCodeInput.value.trim();

        if (!code) {
          showMessage("En mode évaluation, écris ton code élève avant de commencer.", true);
          return;
        }
      }

      index = 0;
      score = 0;
      details = [];
      finalBox.style.display = "none";
      startBtn.disabled = true;
      scoreBadge.textContent = "Score : 0";

      showCurrentCard();
    }

    function showCurrentCard() {
      if (index >= cards.length) {
        finishActivity();
        return;
      }

      const card = cards[index];

      progressBadge.textContent = "Carte : " + (index + 1) + " / " + cards.length;
      microBadge.textContent = "Micro : arrêté";

      if (card.imageUrl) {
        imageZone.innerHTML = `<img src="${card.imageUrl}" alt="Image de l’activité">`;
      } else {
        imageZone.innerHTML = `<div class="placeholder">${escapeHtml(card.word.charAt(0).toUpperCase())}</div>`;
      }

      appBubble.className = "bulle";
      appBubble.innerHTML =
        "<strong>Voix de la Web App</strong>Mot prononcé : <strong>" +
        escapeHtml(card.word) +
        "</strong>";

      studentBubble.className = "bulle";
      studentBubble.innerHTML = "<strong>Voix de l’élève</strong>En attente.";

      resultBubble.className = "bulle";
      resultBubble.innerHTML = "<strong>Résultat</strong>En attente.";

      speakBtn.disabled = true;
      stopBtn.disabled = true;

      speakWord(card.word);
    }

    function speakWord(word) {
      speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = activity.language || "en-GB";
      utterance.rate = 0.85;
      utterance.pitch = 1;

      const voices = speechSynthesis.getVoices();
      const langBase = String(activity.language || "en").split("-")[0];

      const chosenVoice =
        voices.find(v => v.lang === activity.language) ||
        voices.find(v => v.lang && v.lang.startsWith(langBase)) ||
        null;

      if (chosenVoice) {
        utterance.voice = chosenVoice;
      }

      utterance.onend = () => {
        speakBtn.disabled = false;
        showMessage("Clique sur Parler et répète le mot.", false);
      };

      utterance.onerror = () => {
        speakBtn.disabled = false;
        showMessage("Clique sur Parler et répète le mot.", false);
      };

      speechSynthesis.speak(utterance);
    }

    async function startListening() {
      if (!recognition) return;

      try {
        speechSynthesis.cancel();

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(track => track.stop());

        transcripts = [];
        alreadyChecked = false;
        listening = true;

        recognition.start();

        timerStop = setTimeout(() => {
          stopListening();
        }, Number(activity.duration || 10) * 1000);

      } catch (err) {
        microBadge.textContent = "Micro : bloqué";
        showMessage("Le navigateur refuse le micro. Vérifie l’autorisation micro du site.", true);
      }
    }

    function stopListening() {
      if (!recognition || !listening) return;

      try {
        recognition.stop();
      } catch (e) {
        listening = false;
        stopTimers();
        checkAnswer();
      }
    }

    function checkAnswer() {
      const card = cards[index];
      const expected = card.word;
      const recognized = transcripts[0] || "";
      const correct = isCorrect(card, transcripts);

      if (correct) {
        score++;
        scoreBadge.textContent = "Score : " + score;

        resultBubble.className = "bulle bon";
        resultBubble.innerHTML =
          "<strong>Résultat</strong>✅ Validé : le navigateur a reconnu <strong>" +
          escapeHtml(expected) +
          "</strong>.";
      } else {
        resultBubble.className = "bulle mauvais";
        resultBubble.innerHTML =
          "<strong>Résultat</strong>❌ Non validé.<br>" +
          "Mot attendu : <strong>" + escapeHtml(expected) + "</strong><br>" +
          "Mot reconnu : <strong>" + escapeHtml(recognized || "rien compris") + "</strong>";
      }

      details.push({
        order: index + 1,
        expected: expected,
        recognized: recognized || "",
        correct: correct
      });

      speakBtn.disabled = true;
      stopBtn.disabled = true;
      microBadge.textContent = "Micro : arrêté";

      showMessage("On passe à la carte suivante...", false);

      setTimeout(() => {
        index++;
        showCurrentCard();
      }, 1800);
    }

    function isCorrect(card, allTranscripts) {
      const accepted = [card.word];

      if (card.variants) {
        String(card.variants)
          .split(",")
          .map(v => v.trim())
          .filter(Boolean)
          .forEach(v => accepted.push(v));
      }

      for (const transcript of allTranscripts) {
        const normalizedTranscript = normalize(transcript);

        for (const variant of accepted) {
          const normalizedVariant = normalize(variant);

          if (!normalizedVariant) continue;

          if (normalizedTranscript === normalizedVariant) {
            return true;
          }

          if (normalizedTranscript.includes(normalizedVariant)) {
            return true;
          }
        }
      }

      return false;
    }

    function finishActivity() {
      startBtn.disabled = false;
      speakBtn.disabled = true;
      stopBtn.disabled = true;

      progressBadge.textContent = "Carte : " + cards.length + " / " + cards.length;
      microBadge.textContent = "Micro : arrêté";

      imageZone.innerHTML = `<div class="placeholder">✓</div>`;

      appBubble.innerHTML = "<strong>Voix de la Web App</strong>Activité terminée.";
      studentBubble.innerHTML = "<strong>Voix de l’élève</strong>Bravo, tu es arrivé au bout.";

      resultBubble.className = "bulle";
      resultBubble.innerHTML =
        "<strong>Résultat</strong>Score final : <strong>" +
        score +
        " / " +
        cards.length +
        "</strong>";

      finalBox.style.display = "block";
      finalBox.textContent = "Score final : " + score + " / " + cards.length;

      saveResult();
    }

    async function saveResult() {
      try {
        const studentCode = activity.mode === "evaluation"
          ? studentCodeInput.value.trim()
          : "";

        const result = await callApi({
          action: "saveResult",
          id: activity.id,
          title: activity.title,
          mode: activity.mode,
          studentCode: studentCode,
          score: String(score),
          total: String(cards.length),
          detail: JSON.stringify(details)
        });

        if (result.ok) {
          showMessage("Résultat enregistré.", false);
        } else {
          showMessage("Résultat non enregistré : " + (result.error || "erreur inconnue"), true);
        }

      } catch (err) {
        showMessage("Résultat non enregistré : " + (err.message || err), true);
      }
    }

    function resetActivity() {
      speechSynthesis.cancel();

      if (recognition && listening) {
        try {
          recognition.stop();
        } catch (e) {}
      }

      stopTimers();

      index = -1;
      score = 0;
      listening = false;
      alreadyChecked = false;
      transcripts = [];
      details = [];

      scoreBadge.textContent = "Score : 0";
      progressBadge.textContent = "Carte : 0 / " + cards.length;
      microBadge.textContent = "Micro : arrêté";

      imageZone.innerHTML = `<div class="placeholder">?</div>`;

      appBubble.className = "bulle";
      appBubble.innerHTML = "<strong>Voix de la Web App</strong>Clique sur Démarrer.";

      studentBubble.className = "bulle";
      studentBubble.innerHTML = "<strong>Voix de l’élève</strong>La reconnaissance vocale apparaîtra ici.";

      resultBubble.className = "bulle";
      resultBubble.innerHTML = "<strong>Résultat</strong>En attente.";

      finalBox.style.display = "none";

      startBtn.disabled = false;
      speakBtn.disabled = true;
      stopBtn.disabled = true;

      showMessage("Activité réinitialisée.", false);
    }

    function startCountdown() {
      stopDisplayTimer();

      remainingSeconds = Number(activity.duration || 10);
      microBadge.textContent = "Micro : " + remainingSeconds + " s";

      timerDisplay = setInterval(() => {
        remainingSeconds--;
        microBadge.textContent = "Micro : " + remainingSeconds + " s";

        if (remainingSeconds <= 0) {
          stopDisplayTimer();
        }
      }, 1000);
    }

    function stopTimers() {
      if (timerStop) {
        clearTimeout(timerStop);
        timerStop = null;
      }

      stopDisplayTimer();
    }

    function stopDisplayTimer() {
      if (timerDisplay) {
        clearInterval(timerDisplay);
        timerDisplay = null;
      }
    }

    function callApi(params) {
      return new Promise((resolve, reject) => {
        const callbackName =
          "jsonp_" +
          Date.now() +
          "_" +
          Math.random().toString(36).slice(2);

        params.callback = callbackName;

        const query = new URLSearchParams(params).toString();
        const script = document.createElement("script");

        window[callbackName] = data => {
          resolve(data);
          cleanup();
        };

        script.onerror = () => {
          reject(new Error("Impossible de contacter l’API Apps Script."));
          cleanup();
        };

        function cleanup() {
          delete window[callbackName];
          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        script.src = API_URL + "?" + query;
        document.body.appendChild(script);
      });
    }

    function normalize(text) {
      return String(text || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-ZÀ-ÿñÑçÇßäöüÄÖÜ\s']/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function showMessage(text, isError) {
      messageBox.style.display = "block";
      messageBox.textContent = text;
      messageBox.className = isError ? "message erreur" : "message";
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
